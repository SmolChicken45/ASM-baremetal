<HTML>
<HEAD>
<META name="description" content="Violet UML Editor cross format document" />
<META name="keywords" content="Violet, UML" />
<META charset="UTF-8" />
<META name="viewport" content="width=device-width, initial-scale=1" />
<TITLE>Violet UML Diagram</TITLE>
<STYLE type="text/css">
	:root {
		--bg: #f4f6fa;
		--surface: #ffffff;
		--text: #1f2937;
		--muted: #6b7280;
		--primary: #0f4c81;
		--primary-hover: #0b3b65;
		--border: #dbe1ea;
	}

	html, body {
		margin: 0;
		padding: 0;
		background: radial-gradient(circle at top right, #ffffff, var(--bg));
		font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
		color: var(--text);
	}

	body {
		padding: 24px;
	}

	.wrapper {
		max-width: 1100px;
		margin: 0 auto;
		background: var(--surface);
		border: 1px solid var(--border);
		border-radius: 14px;
		box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
		overflow: hidden;
	}

	.header {
		padding: 20px 24px;
		background: linear-gradient(120deg, #f8fbff 0%, #eef4fb 100%);
		border-bottom: 1px solid var(--border);
	}

	.title {
		margin: 0;
		font-size: 22px;
		font-weight: 650;
	}

	.subtitle {
		margin: 8px 0 0;
		color: var(--muted);
		font-size: 14px;
	}

	.header-row {
		display: flex;
		align-items: center;
		gap: 16px;
	}

	.header-icon {
		height: 52px;
		width: auto;
		flex-shrink: 0;
	}

	.toolbar {
		display: flex;
		flex-wrap: wrap;
		gap: 10px;
		padding: 16px 24px;
		border-bottom: 1px solid var(--border);
	}

	.action {
		display: inline-block;
		text-decoration: none;
		font-size: 14px;
		padding: 10px 14px;
		border: 1px solid var(--border);
		border-radius: 8px;
		color: var(--text);
		background: #fff;
		cursor: pointer;
	}

	.action:hover {
		background: #f8fafc;
	}

	.action.primary {
		background: var(--primary);
		border-color: var(--primary);
		color: #fff;
	}

	.action.primary:hover {
		background: var(--primary-hover);
		border-color: var(--primary-hover);
	}

	.preview {
		padding: 24px;
		text-align: center;
	}

	.preview IMG {
		max-width: 100%;
		height: auto;
		border: 1px solid var(--border);
		border-radius: 10px;
		padding: 16px;
		background: #fff;
		box-sizing: border-box;
	}

	.source-panel {
		padding: 0 24px 24px;
	}

	.source {
		display: none;
		padding: 14px;
		border: 1px solid var(--border);
		border-radius: 10px;
		background: #f8fafd;
		font-family: Consolas, "Courier New", monospace;
		font-size: 12px;
		white-space: pre-wrap;
		max-height: 320px;
		overflow: auto;
	}

	@media (max-width: 700px) {
		body {
			padding: 12px;
		}

		.header,
		.toolbar,
		.preview,
		.source-panel {
			padding-left: 14px;
			padding-right: 14px;
		}

		.title {
			font-size: 19px;
		}
	}
</STYLE>
<SCRIPT type="text/javascript">
	var ONLINE_EDITOR_URL = "https://violetumleditor.github.io/product";
	var ONLINE_EDITOR_ORIGIN = "https://violetumleditor.github.io";
	var ONLINE_TRANSFER_PREFIX = "violet-import-v1:";

	function switchVisibility() {
		var obj = document.getElementById("content");
		var isShowing = obj.style.display !== "block";
		obj.style.display = isShowing ? "block" : "none";
		if (isShowing) {
			obj.scrollIntoView({ behavior: "smooth", block: "nearest" });
		}
	}

	function getSuggestedFilename() {
		try {
			var path = window.location.pathname || "";
			path = decodeURIComponent(path);
			var parts = path.split("/");
			var last = parts.length > 0 ? parts[parts.length - 1] : "";
			if (last && last.indexOf(".html") > -1) {
				return last;
			}
		} catch (e) {
			// Ignore and use fallback.
		}
		return "diagram.violet.html";
	}

	function encodeBase64Utf8(text) {
		var bytes = new TextEncoder().encode(text);
		var binary = "";
		var chunkSize = 0x8000;
		for (var i = 0; i < bytes.length; i += chunkSize) {
			var chunk = bytes.subarray(i, i + chunkSize);
			binary += String.fromCharCode.apply(null, chunk);
		}
		return btoa(binary);
	}

	function openInOnlineEditor() {
		// In HTML5, <script> CDATA sections expose the literal <![CDATA[ ... ]]> markers
		// in textContent — strip them so the receiver gets clean XML.
		var rawContent = document.getElementById("content").textContent || "";
		var xmlContent = rawContent.trim();
		if (xmlContent.startsWith("<![CDATA[") && xmlContent.endsWith("]]>")) {
			xmlContent = xmlContent.slice(9, -3).trim();
		}
		var htmlContent = document.documentElement.outerHTML;
		var payload = {
			filename: getSuggestedFilename(),
			sourceVersion: "2.3.2-SNAPSHOT",
			xmlContent: xmlContent,
			htmlContent: htmlContent
		};
		var message = {
			type: ONLINE_TRANSFER_PREFIX,
			payload: payload
		};

		var editorWindow = window.open(ONLINE_EDITOR_URL, "_blank");
		if (!editorWindow) {
			window.alert("Popup blocked. Please allow popups and try again.");
			return false;
		}

		var acknowledged = false;
		var onAck = function(event) {
			if (!event || event.source !== editorWindow || !event.data || event.data.type !== "violet-import-ack") {
				return;
			}
			acknowledged = true;
			window.removeEventListener("message", onAck);
		};
		window.addEventListener("message", onAck);

		var attempts = 0;
		var maxAttempts = 40;
		var timer = window.setInterval(function() {
			if (acknowledged || editorWindow.closed) {
				window.clearInterval(timer);
				window.removeEventListener("message", onAck);
				return;
			}
			attempts += 1;
			try {
				editorWindow.postMessage(message, ONLINE_EDITOR_ORIGIN);
			} catch (e) {
				// Ignore and retry.
			}
			if (attempts >= maxAttempts) {
				window.clearInterval(timer);
				window.removeEventListener("message", onAck);
			}
		}, 250);

		// Keep legacy fallback for environments where message events are filtered.
		editorWindow.name = ONLINE_TRANSFER_PREFIX + encodeBase64Utf8(JSON.stringify(payload));
		editorWindow.focus();
		return false;
	}
</SCRIPT>
